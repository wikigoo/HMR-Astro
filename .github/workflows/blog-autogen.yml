name: Blog Auto-Generator

on:
  schedule:
    # Every Monday at 07:00 UTC (10:30 Tehran time)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      max_articles:
        description: 'Number of articles to generate'
        required: false
        default: '3'
      skip_image:
        description: 'Skip image generation (true/false)'
        required: false
        default: 'false'
      skip_telegram:
        description: 'Skip Telegram publishing (true/false)'
        required: false
        default: 'false'

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ADMIN: ${{ secrets.TELEGRAM_CHANNEL_ADMIN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run blog generator
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          PYTHONUTF8: '1'
        run: |
          MAX=${{ github.event.inputs.max_articles || '3' }}
          SKIP_IMG=${{ github.event.inputs.skip_image || 'false' }}
          SKIP_TG=${{ github.event.inputs.skip_telegram || 'false' }}

          ARGS="--max $MAX"
          [ "$SKIP_IMG" = "true" ] && ARGS="$ARGS --skip-image"
          [ "$SKIP_TG" = "true" ] && ARGS="$ARGS --skip-telegram"

          python scripts/blog_generator.py $ARGS

      - name: Commit new articles and images
        run: |
          git config user.name "HMR Blog Bot"
          git config user.email "bot@hmrbot.com"

          # Stage new articles, images, and updated registry
          git add src/content/blog/ || true
          git add public/blog/images/ || true
          git add scripts/published_topics.json || true

          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No new articles generated."
          else
            COUNT=$(git diff --cached --name-only | grep "src/content/blog/" | wc -l)
            git commit -m "blog: auto-publish ${COUNT} article(s) — $(date +%Y-%m-%d)"
            git push
            echo "Published $COUNT new article(s) and pushed to main."
          fi

      - name: Alert operator on failure
        if: failure()
        run: |
          MSG="⚠️ خطا در pipeline بلاگ همر%0Aتاریخ: $(date '+%Y-%m-%d %H:%M UTC')%0Aبرنچ: ${{ github.ref_name }}%0Aلینک: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHANNEL_ADMIN}&text=${MSG}&parse_mode=HTML" || true
