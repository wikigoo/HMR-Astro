<!-- @dsCard group="Components" viewport="700x400" name="Brand — lang toggle & pillar card" subtitle="LangToggle · PillarCard" -->
<!doctype html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--surface-page);padding:26px;font-family:var(--font-en);position:relative;overflow:hidden}
  .glow{position:absolute;width:300px;height:300px;border-radius:50%;filter:blur(90px);opacity:.32}
  .gc{background:var(--hmr-cyan);top:-110px;left:40px}
  .gi{background:var(--hmr-indigo);bottom:-130px;right:-30px}
  #root{position:relative;z-index:2;display:flex;flex-direction:column;gap:20px}
  .lbl{color:var(--text-muted);font-size:11px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head><body>
<div class="glow gc"></div><div class="glow gi"></div>
<div id="root"></div>
<script type="text/babel">
  const { LangToggle, PillarCard } = window.HMRDesignSystem_2cb0f9;
  function Demo() {
    const [lang, setLang] = React.useState('en');
    return (
      <React.Fragment>
        <div>
          <div className="lbl">Language toggle</div>
          <LangToggle lang={lang} onChange={setLang} />
        </div>
        <div>
          <div className="lbl">Pillar cards</div>
          <div className="grid">
            <PillarCard icon="◈" accent="cyan" title="Used phone guidance"
              description="Fair-price checks, inspection checklists, registry status, counterfeit-part detection."
              question="Is a Samsung A54 worth 35M after 18 months?" />
            <PillarCard icon="◆" accent="indigo" title="Troubleshooting"
              description="Describe a symptom in plain language; get a likely cause, a safe fix, or a trusted referral."
              question="My iPhone 12 overheats and drains fast — what do I do?" />
          </div>
        </div>
      </React.Fragment>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body></html>
